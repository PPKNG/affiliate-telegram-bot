name: Daily Affiliate Alert

on:
  schedule:
    - cron: '0 0 * * *' # ตั้งเวลารันตอน 7 โมงเช้าเวลาไทย
  workflow_dispatch: # ทำให้เรากดปุ่มรันด้วยตัวเองได้ด้วย

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run script
        run: python main.py
